status-website:
  cname: status.intellekt.fyi
  name: intellekt status
  logoUrl: https://raw.githubusercontent.com/intellekthq/statuspage/main/assets/logo.svg
  introTitle: Intellekt Status
  introMessage: Live pulse on every intellekt API. Pinged from neutral public infrastructure, every five minutes. If something here is red, your stack is seeing it too — and we're already on it.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/intellekthq/statuspage
  favicon: https://raw.githubusercontent.com/intellekthq/statuspage/main/assets/favicon.svg
  js: |
    /* Replace the hardcoded ✅/🟥 emoji in <article class="up|down">
       with a brand-toned dot + clean text. Sapper hydrates after page
       load, so we use a MutationObserver to catch render passes. */
    (function () {
      var EMOJI_RE = /[✀-➿\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2B00}-\u{2BFF}\u{1F600}-\u{1F64F}]+/gu;
      function clean(text) {
        return text.replace(EMOJI_RE, "").replace(/ /g, " ").replace(/\s+/g, " ").trim();
      }
      function fix() {
        document.querySelectorAll("article.up:not(.link):not([data-iq])").forEach(function (a) {
          var msg = clean(a.textContent);
          if (!msg) return;
          a.innerHTML =
            '<span class="iq-dot iq-dot-up" aria-hidden="true"></span>' +
            '<span class="iq-status-msg">' + msg + '</span>' +
            '<span class="iq-status-meta" aria-hidden="true">live</span>';
          a.setAttribute("data-iq", "1");
        });
        document.querySelectorAll("article.down:not(.link):not([data-iq])").forEach(function (a) {
          var msg = clean(a.textContent);
          if (!msg) return;
          a.innerHTML =
            '<span class="iq-dot iq-dot-down" aria-hidden="true"></span>' +
            '<span class="iq-status-msg">' + msg + '</span>' +
            '<span class="iq-status-meta" aria-hidden="true">investigating</span>';
          a.setAttribute("data-iq", "1");
        });
      }
      function start() {
        fix();
        new MutationObserver(fix).observe(document.body, { childList: true, subtree: true });
      }
      if (document.body) start();
      else document.addEventListener("DOMContentLoaded", start);
    })();
  css: |
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    :root {
      --iq-bg: #FAFAFA;
      --iq-surface: #FFFFFF;
      --iq-border: #ECECF0;
      --iq-text: #0F172A;
      --iq-text-muted: #475569;
      --iq-text-soft: #94A3B8;
      --iq-primary: #7c3aed;
      --iq-primary-deep: #5b21b6;
      --iq-primary-tint: #F5F3FF;
      --iq-primary-tint-2: #EDE9FE;
      --iq-primary-glow: rgba(124, 58, 237, 0.08);
      --iq-up: #047857;
      --iq-up-tint: #ECFDF5;
      --iq-down: #B91C1C;
      --iq-down-tint: #FEF2F2;
      --iq-radius: 10px;
      --iq-radius-sm: 6px;
      --iq-radius-lg: 14px;
      --font-sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
      --font-mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;
    }

    /* ===== Reset Upptime defaults ===== */
    html, body {
      background: var(--iq-bg) !important;
      color: var(--iq-text) !important;
      font-family: var(--font-sans) !important;
      font-feature-settings: "ss01", "cv11";
      letter-spacing: -0.003em;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== Top nav ===== */
    nav {
      background: var(--iq-bg) !important;
      border-bottom: 1px solid var(--iq-border) !important;
      padding: 1.25rem 0 !important;
    }
    nav .container { max-width: 880px !important; }
    nav .logo { gap: 0.625rem; }
    nav .logo img { width: 28px !important; height: 56px !important; }
    nav .logo div {
      font-family: var(--font-display) !important;
      font-weight: 500 !important;
      font-size: 1.05rem !important;
      letter-spacing: -0.015em;
      color: var(--iq-text) !important;
      font-variation-settings: 'opsz' 36;
    }
    nav ul a {
      font-family: var(--font-mono) !important;
      font-size: 0.75rem !important;
      font-weight: 400 !important;
      letter-spacing: 0.08em !important;
      text-transform: uppercase;
      color: var(--iq-text-muted) !important;
      transition: color 0.18s ease;
    }
    nav ul a:hover { color: var(--iq-primary) !important; }
    nav ul a[aria-current="page"] { color: var(--iq-text) !important; }

    /* ===== Main container ===== */
    main.container {
      max-width: 880px !important;
      padding: 4.5rem 1.5rem 6rem !important;
    }

    /* ===== Hero ===== */
    main > header { margin-bottom: 2.5rem; }
    main > header h1 {
      font-family: var(--font-display) !important;
      font-weight: 500 !important;
      font-size: clamp(2.5rem, 5.5vw, 3.5rem) !important;
      letter-spacing: -0.025em !important;
      line-height: 1.05 !important;
      font-variation-settings: 'opsz' 144;
      color: var(--iq-text) !important;
      margin: 0 0 1.25rem 0 !important;
    }
    main > header .lead, main p.lead {
      font-family: var(--font-sans) !important;
      font-size: 1.0625rem !important;
      line-height: 1.6 !important;
      color: var(--iq-text-muted) !important;
      max-width: 60ch;
      margin: 0 !important;
      font-weight: 400;
    }

    /* ===== Status banner (article.up not.link, JS-replaced) ===== */
    article.up:not(.link), article.down:not(.link) {
      background: var(--iq-surface) !important;
      border: 1px solid var(--iq-border) !important;
      border-radius: var(--iq-radius) !important;
      padding: 1.125rem 1.375rem !important;
      margin: 0 0 2.75rem 0 !important;
      display: flex !important;
      align-items: center !important;
      gap: 0.875rem !important;
      position: relative !important;
      color: var(--iq-text) !important;
      font-family: var(--font-sans) !important;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
    }
    article.up:not(.link)::before, article.down:not(.link)::before {
      content: "";
      position: absolute;
      left: 0; top: 0.875rem; bottom: 0.875rem;
      width: 2px;
      border-radius: 0 2px 2px 0;
    }
    article.up:not(.link)::before { background: var(--iq-up); }
    article.down:not(.link)::before { background: var(--iq-down); }

    .iq-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      position: relative;
    }
    .iq-dot::after {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.16;
      animation: iq-pulse 2.6s ease-in-out infinite;
    }
    .iq-dot-up { background: var(--iq-up); color: var(--iq-up); }
    .iq-dot-down { background: var(--iq-down); color: var(--iq-down); }
    @keyframes iq-pulse {
      0%, 100% { transform: scale(0.85); opacity: 0.12; }
      50% { transform: scale(1.5); opacity: 0.28; }
    }
    .iq-status-msg {
      font-size: 0.9375rem;
      font-weight: 500;
      letter-spacing: -0.005em;
      color: var(--iq-text);
    }
    .iq-status-meta {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--iq-text-soft);
    }

    /* ===== Section labels ("Live Status") ===== */
    main h2 {
      font-family: var(--font-mono) !important;
      font-size: 0.6875rem !important;
      font-weight: 500 !important;
      letter-spacing: 0.16em !important;
      text-transform: uppercase !important;
      color: var(--iq-text-soft) !important;
      margin: 2.5rem 0 1.25rem 0 !important;
    }

    /* ===== Window selector pill (24h / 7d / ...) ===== */
    form.f.r {
      background: transparent !important;
      padding: 0 !important;
      gap: 0.25rem !important;
      display: inline-flex;
    }
    form.f.r div { margin: 0 !important; }
    form.f.r label {
      font-family: var(--font-mono) !important;
      font-size: 0.6875rem !important;
      font-weight: 400 !important;
      letter-spacing: 0.06em !important;
      text-transform: uppercase;
      padding: 0.375rem 0.75rem !important;
      border-radius: 999px;
      cursor: pointer;
      color: var(--iq-text-soft) !important;
      transition: all 0.16s;
      border: 1px solid transparent;
    }
    form.f.r label:hover { color: var(--iq-text); }
    form.f.r input { display: none; }
    form.f.r input:checked + label {
      background: var(--iq-text) !important;
      color: var(--iq-bg) !important;
    }

    /* ===== Service cards (article.up.link.graph) ===== */
    section.live-status, section.svelte-8lnl4f {
      display: grid;
      gap: 0.625rem;
    }
    article.up.link, article.down.link, article.up.link.graph, article.down.link.graph {
      /* Use background-color (not background shorthand) so the graph
         background-image set by Sapper via --background survives.
         A white overlay tones the chart down so it reads as a subtle
         backdrop, not a screaming chart. */
      background-color: var(--iq-surface) !important;
      background-image: linear-gradient(rgba(255,255,255,0.88), rgba(255,255,255,0.88)), var(--background) !important;
      background-size: cover !important;
      background-position: center bottom !important;
      background-repeat: no-repeat !important;
      border: 1px solid var(--iq-border) !important;
      border-radius: var(--iq-radius) !important;
      padding: 1.375rem 1.5rem !important;
      margin: 0 !important;
      display: grid !important;
      grid-template-columns: 52px 1fr !important;
      gap: 1.25rem;
      align-items: center;
      transition: all 0.18s ease;
      text-decoration: none !important;
      color: var(--iq-text) !important;
      position: relative !important;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
    }
    article.up.link::before, article.down.link::before { display: none !important; }
    article.up.link:hover, article.up.link.graph:hover {
      border-color: var(--iq-primary) !important;
      box-shadow: 0 1px 3px var(--iq-primary-glow), 0 8px 24px var(--iq-primary-glow) !important;
      transform: translateY(-1px);
    }
    article .icon {
      width: 52px !important;
      height: 52px !important;
      border-radius: 12px !important;
      background: var(--iq-primary-tint) !important;
      padding: 6px !important;
      object-fit: contain !important;
      box-sizing: border-box;
    }
    article h4 {
      font-family: var(--font-sans) !important;
      font-weight: 500 !important;
      font-size: 1rem !important;
      letter-spacing: -0.008em !important;
      color: var(--iq-text) !important;
      margin: 0 0 0.5rem 0 !important;
    }
    article h4 a {
      color: var(--iq-text) !important;
      text-decoration: none !important;
    }
    article h4 a:hover { color: var(--iq-primary) !important; }
    /* Card body — uptime + response time */
    article.up.link p, article.up.link.graph p,
    article.up.link div, article.up.link.graph div {
      font-family: var(--font-mono) !important;
      font-size: 0.75rem !important;
      letter-spacing: 0.02em;
      color: var(--iq-text-muted) !important;
      margin: 0.1875rem 0 !important;
    }

    /* ===== Footer ===== */
    footer {
      max-width: 880px !important;
      margin: 0 auto !important;
      padding: 3.5rem 1.5rem 2rem !important;
      text-align: center !important;
      border-top: 1px solid var(--iq-border) !important;
    }
    footer p {
      font-family: var(--font-mono) !important;
      font-size: 0.6875rem !important;
      letter-spacing: 0.06em !important;
      color: var(--iq-text-soft) !important;
      margin: 0 !important;
    }
    footer a {
      color: var(--iq-text-muted) !important;
      text-decoration: none !important;
      border-bottom: 1px dotted var(--iq-text-soft);
      padding-bottom: 1px;
    }
    footer a:hover { color: var(--iq-primary) !important; border-bottom-color: var(--iq-primary); }

    /* ===== Generic anchor color (after specifics above) ===== */
    main a:not(.logo):not([aria-current]) { color: var(--iq-primary); }
    main a:not(.logo):not([aria-current]):hover { color: var(--iq-primary-deep); }

    /* ===== Loading spinner — make it less screamy ===== */
    .loading svg { opacity: 0.35; }
    .loading svg circle, .loading svg path { stroke: var(--iq-text-soft) !important; }

    /* ===== Rate-limit fallback page ===== */
    main > h1 {
      font-family: var(--font-display) !important;
      font-weight: 500 !important;
      font-size: 2rem !important;
      letter-spacing: -0.02em !important;
    }
    main form input[type="text"] {
      font-family: var(--font-mono) !important;
      font-size: 0.85rem !important;
      padding: 0.625rem 0.875rem !important;
      border: 1px solid var(--iq-border) !important;
      border-radius: var(--iq-radius-sm) !important;
      background: var(--iq-surface) !important;
    }
    main form .submit-button {
      background: var(--iq-text) !important;
      color: var(--iq-bg) !important;
      font-family: var(--font-sans) !important;
      font-weight: 500 !important;
      font-size: 0.85rem !important;
      padding: 0.625rem 1rem !important;
      border-radius: var(--iq-radius-sm) !important;
      border: none !important;
      cursor: pointer;
      transition: background 0.15s;
    }
    main form .submit-button:hover { background: var(--iq-primary-deep) !important; }

assignees:
  - mach-kernel

i18n:
  activeIncidents: Active incidents
  allSystemsOperational: All systems operational

notifications: []
